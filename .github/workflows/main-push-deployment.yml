name: Main Push Deployment with tests and docker image build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  test-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - run: npm install
      - run: npm test

  build-docker-image:
    needs: test-changes
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          file: ./Dockerfile
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:latest

  deploy:
    needs: build-docker-image
    runs-on: ubuntu-latest

    steps:
      - name: Pull and deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            python << EOF
            import subprocess
            import os 

            result = subprocess.run(f"docker ps --filter name=simple-node-api --format '{{{{.Names}}}} {{{{.Status}}}}'",
                                    shell=True,
                                    capture_output=True,
                                    text=True
                                )

            print(result.stdout)

            if "simple-node-api" in result.stdout and "Up" in result.stdout:
                print("Container is currently running.")
                stop_container = subprocess.run("docker stop simple-node-api",
                                              shell=True,
                                              capture_output=True,
                                              text=True
                                            )
                if stop_container.returncode == 0:
                    print("Container stopped successfully.")
                    remove_container = subprocess.run("docker rm -f simple-node-api",
                                                shell=True,
                                                capture_output=True,
                                                text=True
                                                )
                    if remove_container.returncode == 0:
                        print("Container removed successfully.")
                        pull_image = subprocess.run("docker pull ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:${{ github.sha }}",
                                                    shell=True,
                                                    capture_output=True,
                                                    text=True
                                                )
                        if pull_image.returncode == 0:
                            print("Image pulled successfully.")
                            run_container = subprocess.run("docker run -d -p 4000:4000 --name simple-node-api ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:${{ github.sha }}",
                                                        shell=True,
                                                        capture_output=True,
                                                        text=True
                                                    )
                            check_result = subprocess.run(f"docker ps --filter name=simple-node-api --format '{{{{.Names}}}} {{{{.Status}}}}'",
                                    shell=True,
                                    capture_output=True,
                                    text=True
                                )
                            
                            if "simple-node-api" in check_result.stdout and "Up" in check_result.stdout:
                                print("Container started successfully.")
                                exit(0)
                              
                            else:
                                print("Failed to start the container.")
                                exit(1)

                    else:
                        print("Failed to remove the container.")
                        exit(1)
                
                else: 
                    print("Failed to stop the container.")
                    exit(1)
                  
            else:
                print("Container is not running. Proceeding to pull and run the container.")
                pull_image = subprocess.run("docker pull ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:${{ github.sha }}",
                                            shell=True,
                                            capture_output=True,
                                            text=True
                                        )
                if pull_image.returncode == 0:
                    print("Image pulled successfully.")
                    run_container = subprocess.run("docker run -d -p 4000:4000 --name simple-node-api ghcr.io/${{ github.repository_owner }}/simple-nodejs-app:${{ github.sha }}",
                                                shell=True,
                                                capture_output=True,
                                                text=True
                                            )
                    check_result = subprocess.run(f"docker ps --filter name=simple-node-api --format '{{{{.Names}}}} {{{{.Status}}}}'",
                                    shell=True,
                                    capture_output=True,
                                    text=True
                                )
                    
                    if "simple-node-api" in check_result.stdout and "Up" in check_result.stdout:
                        print("Container started successfully.")
                        exit(0)
                      
                    else:
                        print("Failed to start the container.")
                        exit(1) 
            EOF
    
